<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>נדב — תוכנית אימון</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
  --red: #E94560;
  --blue: #0F3460;
  --green: #16A085;
  --purple: #8E44AD;
  --dark: #0a0a1a;
  --card: rgba(255,255,255,0.05);
  --border: rgba(255,255,255,0.08);
  --text: #e8e8e8;
  --text2: rgba(255,255,255,0.55);
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--dark);
  color: var(--text);
  font-family: 'Heebo', sans-serif;
  -webkit-font-smoothing: antialiased;
}

#app {
  height: 100%;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.header {
  background: linear-gradient(135deg, #E94560 0%, #0F3460 100%);
  padding: calc(12px + var(--safe-top)) 16px 12px;
  flex-shrink: 0;
  position: relative;
  z-index: 100;
  box-shadow: 0 4px 30px rgba(233,69,96,0.25);
}

.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}

.header h1 { font-size: 19px; font-weight: 800; color: #fff; }
.header-sub { font-size: 11px; color: rgba(255,255,255,0.7); margin-top: 2px; }

.view-toggle { display: flex; gap: 6px; }

.view-btn {
  padding: 7px 14px;
  border-radius: 20px;
  border: none;
  font-family: 'Heebo', sans-serif;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  background: rgba(255,255,255,0.15);
  color: #fff;
}
.view-btn.active { background: #fff; color: var(--red); }

.day-tabs {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  padding-bottom: 4px;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.day-tabs::-webkit-scrollbar { display: none; }

.day-tab {
  flex: 0 0 auto;
  padding: 9px 14px;
  border-radius: 10px;
  border: 2px solid transparent;
  background: rgba(255,255,255,0.08);
  color: #fff;
  font-family: 'Heebo', sans-serif;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s;
}
.day-tab.active { border-color: #fff; background: rgba(255,255,255,0.22); }

.search-bar { padding: 12px 16px 8px; flex-shrink: 0; }

.search-input {
  width: 100%;
  padding: 13px 18px;
  border-radius: 14px;
  border: 2px solid rgba(233,69,96,0.2);
  background: rgba(255,255,255,0.06);
  color: #fff;
  font-family: 'Heebo', sans-serif;
  font-size: 15px;
  outline: none;
  direction: rtl;
  transition: border-color 0.2s;
}
.search-input:focus { border-color: var(--red); }
.search-input::placeholder { color: rgba(255,255,255,0.35); }

.search-tags { display: flex; flex-wrap: wrap; gap: 6px; padding: 10px 16px; }
.search-tag {
  padding: 5px 12px;
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.04);
  color: rgba(255,255,255,0.55);
  font-family: 'Heebo', sans-serif;
  font-size: 12px;
  cursor: pointer;
}

.content {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 12px 14px calc(80px + var(--safe-bottom));
}

.progress-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px 16px;
  margin-bottom: 14px;
}
.progress-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
  font-size: 13px;
  font-weight: 600;
}
.progress-bar { height: 7px; background: rgba(255,255,255,0.08); border-radius: 4px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 4px; transition: width 0.4s ease; }
.progress-done { text-align: center; margin-top: 8px; font-size: 13px; color: #2ecc71; font-weight: 700; }

.wrist-warning {
  background: rgba(243,156,18,0.1);
  border: 1px solid rgba(243,156,18,0.25);
  border-radius: 12px;
  padding: 11px 14px;
  margin-bottom: 14px;
  font-size: 12px;
  line-height: 1.7;
}

.section-header { display: flex; align-items: center; gap: 10px; padding: 12px 4px 8px; }
.section-line { width: 4px; height: 22px; border-radius: 2px; }
.section-title { font-size: 15px; font-weight: 700; color: #fff; }

.ex-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  margin-bottom: 8px;
  overflow: hidden;
  transition: all 0.25s;
  animation: slideIn 0.2s ease;
}
.ex-card.done { background: rgba(46,204,113,0.06); border-color: rgba(46,204,113,0.2); }

.ex-main {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 14px;
  cursor: pointer;
  -webkit-user-select: none;
  user-select: none;
}

.ex-icon {
  width: 40px; height: 40px;
  border-radius: 11px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.ex-info { flex: 1; min-width: 0; }
.ex-name { font-weight: 700; font-size: 14px; color: #fff; margin-bottom: 2px; line-height: 1.3; }
.ex-meta { font-size: 11px; color: var(--text2); display: flex; gap: 8px; flex-wrap: wrap; }
.ex-day-badge { font-size: 10px; font-weight: 700; margin-top: 3px; }
.ex-arrow { font-size: 12px; color: rgba(255,255,255,0.2); transition: transform 0.3s; flex-shrink: 0; }
.ex-arrow.open { transform: rotate(180deg); }

.ex-expanded { padding: 0 14px 14px; border-top: 1px solid rgba(255,255,255,0.05); }

.ex-notes {
  background: rgba(255,255,255,0.03);
  border-radius: 10px;
  padding: 10px 12px;
  margin: 10px 0;
  font-size: 12px;
  line-height: 1.7;
  color: rgba(255,255,255,0.7);
}

.ex-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 12px; }
.ex-stat { border-radius: 10px; padding: 8px; text-align: center; }
.ex-stat-label { font-size: 10px; color: var(--text2); margin-bottom: 1px; }
.ex-stat-value { font-size: 17px; font-weight: 800; }

.ex-actions { display: flex; gap: 8px; }

.video-btn {
  flex: 1;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  padding: 12px;
  border-radius: 12px;
  background: linear-gradient(135deg, #FF0000, #CC0000);
  color: #fff;
  text-decoration: none;
  font-family: 'Heebo', sans-serif;
  font-weight: 700;
  font-size: 14px;
  border: none;
  box-shadow: 0 4px 15px rgba(255,0,0,0.2);
  cursor: pointer;
  -webkit-user-select: none;
}
.video-btn:active { transform: scale(0.97); }

.done-btn {
  width: 48px; height: 48px;
  border-radius: 12px;
  border: 2px solid rgba(255,255,255,0.12);
  background: transparent;
  color: rgba(255,255,255,0.3);
  font-size: 22px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
  flex-shrink: 0;
}
.done-btn.checked { border-color: #2ecc71; background: rgba(46,204,113,0.12); color: #2ecc71; }

.timer-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: rgba(10,10,26,0.95);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid rgba(255,255,255,0.1);
  padding: 12px 16px calc(12px + var(--safe-bottom));
  display: flex;
  align-items: center;
  gap: 12px;
  z-index: 200;
  transform: translateY(100%);
  transition: transform 0.3s ease;
}
.timer-bar.visible { transform: translateY(0); }

.timer-display {
  font-size: 32px;
  font-weight: 900;
  font-variant-numeric: tabular-nums;
  min-width: 80px;
  text-align: center;
}

.timer-btns { display: flex; gap: 8px; flex: 1; }

.timer-preset {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.06);
  color: #fff;
  font-family: 'Heebo', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}
.timer-preset:active, .timer-preset.running { background: var(--red); border-color: var(--red); }

.timer-close {
  width: 40px; height: 40px;
  border-radius: 20px;
  border: none;
  background: rgba(255,255,255,0.08);
  color: #fff;
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}

.timer-fab {
  position: fixed;
  bottom: calc(20px + var(--safe-bottom));
  left: 16px;
  width: 56px; height: 56px;
  border-radius: 28px;
  background: linear-gradient(135deg, var(--red), #c0392b);
  color: #fff;
  border: none;
  font-size: 24px;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(233,69,96,0.4);
  display: flex; align-items: center; justify-content: center;
  z-index: 150;
  transition: transform 0.2s;
}
.timer-fab:active { transform: scale(0.9); }

.search-empty { text-align: center; padding: 50px 20px; color: rgba(255,255,255,0.35); }
.search-empty-icon { font-size: 44px; margin-bottom: 12px; }
.search-empty p { font-size: 14px; }
.search-count { font-size: 12px; color: var(--text2); padding: 4px 4px 8px; }

@keyframes slideIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Video player styles */
.vid-wrap { margin: 10px 0; border-radius: 12px; overflow: hidden; background: #000; position: relative; aspect-ratio: 16/9; }
.vid-wrap iframe { width: 100%; height: 100%; border: none; display: block; }
.vid-thumb { width: 100%; height: 100%; position: relative; cursor: pointer; }
.vid-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.vid-play { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 64px; height: 64px; background: rgba(255,0,0,0.92); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
.vid-play::after { content: ''; border-left: 26px solid #fff; border-top: 15px solid transparent; border-bottom: 15px solid transparent; margin-right: -4px; }
.vid-hint { text-align: center; font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 4px; letter-spacing: 0.05em; }
.vid-loading { display: flex; align-items: center; justify-content: center; height: 160px; color: rgba(255,255,255,.5); font-size: 13px; gap: 8px; }
.vid-spinner { width: 22px; height: 22px; border: 3px solid rgba(255,255,255,.1); border-top-color: var(--red); border-radius: 50%; animation: vspin .7s linear infinite; }
@keyframes vspin { to { transform: rotate(360deg); } }
.vid-err { text-align: center; padding: 12px; color: rgba(255,255,255,.45); font-size: 12px; margin: 10px 0; }
</style>

function playVideo(key, vid) {
  vidPlay[key] = true;
  var wrap = document.getElementById('vid-' + key);
  if (wrap && vid) {
    wrap.innerHTML = '<iframe src="https://www.youtube-nocookie.com/embed/' + vid +
      '?autoplay=1&rel=0&modestbranding=1&playsinline=1" allowfullscreen ' +
      'allow="autoplay; encrypted-media; fullscreen; picture-in-picture"></iframe>';
  }
}

function videoHtml(key, query) {
  var vid = VIDEO_MAP[query] || null;

  if (!vid) {
    // No hardcoded ID — show YouTube search link as fallback
    return '<div class="vid-err">🎬 <a href="https://www.youtube.com/results?search_query=' +
      encodeURIComponent(query + " exercise tutorial") +
      '" target="_blank" style="color:#E94560">חפש הדגמה ב-YouTube</a></div>';
  }

  if (vidPlay[key]) {
    return '<div class="vid-wrap" id="vid-' + key + '"><iframe src="https://www.youtube-nocookie.com/embed/' +
      vid + '?autoplay=1&rel=0&modestbranding=1&playsinline=1" ' +
      'allowfullscreen allow="autoplay; encrypted-media; fullscreen; picture-in-picture"></iframe></div>';
  }

  // Thumbnail + play button — passes vid ID directly so playVideo can swap in-place
  var thumb = "https://img.youtube.com/vi/" + vid + "/mqdefault.jpg";
  return '<div class="vid-wrap" id="vid-' + key + '"><div class="vid-thumb" onclick="event.stopPropagation();playVideo(\'' +
    key + '\',\'' + vid + '\')">' +

// TIMER
function startTimer(seconds) {
  clearInterval(state.timerInterval);
  state.timerSeconds = seconds;
  state.timerRunning = true;
  state.timerVisible = true;
  state.timerInterval = setInterval(function() {
    state.timerSeconds--;
    if (state.timerSeconds <= 0) {
      clearInterval(state.timerInterval);
      state.timerRunning = false;
      state.timerSeconds = 0;
      if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 200]);
    }
    render();
  }, 1000);
  render();
}

function stopTimer() {
  clearInterval(state.timerInterval);
  state.timerRunning = false;
  state.timerVisible = false;
  render();
}

function formatTime(s) {
  var m = Math.floor(s / 60);
  var sec = s % 60;
  return m + ":" + (sec < 10 ? "0" : "") + sec;
}

// RENDER
function render() {
  var _scrollY = window.scrollY || window.pageYOffset || 0;
  var app = document.getElementById("app");
  var day = DAYS.find(function(d){ return d.id === state.activeDay; });
  var isSearch = state.view === "search";

  var searchResults = [];
  if (isSearch && state.search.trim()) {
    var q = state.search.toLowerCase();
    allExercises.forEach(function(ex) {
      if (ex.name.toLowerCase().includes(q) || ex.notes.toLowerCase().includes(q) || ex.sectionName.toLowerCase().includes(q)) {
        searchResults.push(ex);
      }
    });
  }

  var total = 0, done = 0;
  if (day) {
    day.sections.forEach(function(sec) {
      sec.exercises.forEach(function(ex, i) {
        total++;
        if (state.completed[day.id + "-" + sec.name + "-" + i]) done++;
      });
    });
  }
  var pct = total > 0 ? Math.round((done / total) * 100) : 0;

  var html = "";

  // Header
  html += '<div class="header"><div class="header-top"><div><h1>💪 תוכנית אימון</h1><div class="header-sub">בנייה מהיסודות | יציבות → חוזק → מוביליות</div></div>';

  html += '<button class="view-btn ' + (!isSearch ? 'active' : '') + '" onclick="switchView(\'plan\')">📋</button>';
  html += '<button class="view-btn ' + (isSearch ? 'active' : '') + '" onclick="switchView(\'search\')">🔍</button>';
  html += '</div></div>';

  if (!isSearch) {
    html += '<div class="day-tabs">';
    DAYS.forEach(function(d) {
      html += '<button class="day-tab ' + (d.id === state.activeDay ? 'active' : '') + '" onclick="switchDay(\'' + d.id + '\')">' + d.icon + ' יום ' + d.id + '</button>';
    });
    html += '</div>';
  }
  html += '</div>';

  // Content
  html += '<div class="content" id="content">';

  if (isSearch) {
    html += '<div class="search-bar"><input class="search-input" type="text" placeholder="🔍 חפש תרגיל..." value="' + escHtml(state.search) + '" oninput="onSearch(this.value)" autofocus></div>';
    if (!state.search.trim()) {
      html += '<div class="search-tags">';
      ["squat", "ליבה", "כתפיים", "stretch", "TRX", "Landmine", "קטלבל", "רגל", "ירך"].forEach(function(tag) {
        html += '<button class="search-tag" onclick="onSearch(\'' + tag + '\')">' + tag + '</button>';
      });
      html += '</div>';
      html += '<div class="search-empty"><div class="search-empty-icon">🔍</div><p>חפש תרגיל לפי שם או קבוצת שרירים</p></div>';

    html += '<div class="progress-card">';
    html += '<div class="progress-top"><span>' + day.icon + ' יום ' + day.id + ' — ' + day.title + '</span>';
    html += '<span style="color:' + day.color + ';font-weight:700">' + done + '/' + total + '</span></div>';
    html += '<div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%;background:' + day.color + '"></div></div>';
    if (pct === 100) html += '<div class="progress-done">🎉 סיימת! כל הכבוד!</div>';
    html += '</div>';

    if (day.id === "B" || day.id === "D") {
      html += '<div class="wrist-warning">⚠️ <strong>שורש כף יד ימין:</strong> בתרגילים שדורשים אחיזת כף יד פתוחה — השתמש באגרופים, Push-Up Handles, או אחיזת EZ-Bar. אם כואב — תעצור!</div>';
    }

    day.sections.forEach(function(sec) {
      html += '<div class="section-header"><div class="section-line" style="background:' + day.color + '"></div><div class="section-title">' + sec.name + '</div></div>';
      sec.exercises.forEach(function(ex, ei) {
        var key = day.id + "-" + sec.name + "-" + ei;
        html += renderExCard(ex, key, day.color, false);
      });
    });
  }

  html += '</div>'; // content

  if (!state.timerVisible) {
    html += '<button class="timer-fab" onclick="showTimer()">⏱</button>';
  }

  html += '<div class="timer-bar ' + (state.timerVisible ? 'visible' : '') + '">';
  html += '<div class="timer-display" style="color:' + (state.timerSeconds <= 5 && state.timerRunning ? '#E94560' : '#fff') + '">' + formatTime(state.timerSeconds) + '</div>';
  html += '<div class="timer-btns">';

  html += '<button class="timer-preset ' + (state.timerRunning ? 'running' : '') + '" onclick="startTimer(90)">90ש</button>';
  html += '<button class="timer-preset ' + (state.timerRunning ? 'running' : '') + '" onclick="startTimer(120)">120ש</button>';
  html += '</div>';
  html += '<button class="timer-close" onclick="stopTimer()">✕</button>';
  html += '</div>';

  app.innerHTML = html;
  // Restore scroll — wait one frame for Safari to finish layout before scrolling
  if (_scrollY > 0) {
    requestAnimationFrame(function() {
      window.scrollTo(0, _scrollY);
    });
  }
}

function buildExpandedContent(ex, key, color) {
  var isDone = !!state.completed[key];
  var gq = ex.video || ex.name.replace(/[\u05d0-\u05ea]/g, '').trim() || ex.name;
  var html = videoHtml(key, gq);
  html += '<div class="ex-notes">💡 <strong>הערות:</strong> ' + escHtml(ex.notes) + '</div>';
  html += '<div class="ex-grid">';
  html += '<div class="ex-stat" style="background:' + color + '12"><div class="ex-stat-label">סטים</div><div class="ex-stat-value" style="color:' + color + '">' + ex.sets + '</div></div>';
  html += '<div class="ex-stat" style="background:' + color + '12"><div class="ex-stat-label">חזרות</div><div class="ex-stat-value" style="color:' + color + '">' + ex.reps + '</div></div>';
  html += '<div class="ex-stat" style="background:' + color + '12"><div class="ex-stat-label">מנוחה</div><div class="ex-stat-value" style="color:' + color + '">' + (ex.rest === "-" ? "—" : ex.rest + "ש") + '</div></div>';
  html += '</div>';
  html += '<div class="ex-actions">';
  html += '<button class="done-btn ' + (isDone ? 'checked' : '') + '" onclick="event.stopPropagation();toggleDone(\'' + key + '\')" style="width:100%;border-radius:12px;font-size:15px;">' + (isDone ? '✅ סיימתי' : '○ סמן כהושלם') + '</button>';
  html += '</div>';
  return html;
}

function renderExCard(ex, key, color, showDay) {
  exMap[key] = {ex: ex, color: color}; // register for in-place updates
  var isExpanded = state.expandedEx === key;
  var isDone = !!state.completed[key];

  var html = '<div class="ex-card ' + (isDone ? 'done' : '') + '" id="excard-' + key + '">';
  html += '<div class="ex-main" onclick="toggleEx(\'' + key + '\')">';
  html += '<div class="ex-icon" style="background:' + color + '18">' + ex.icon + '</div>';
  html += '<div class="ex-info">';
  html += '<div class="ex-name">' + escHtml(ex.name) + '</div>';
  html += '<div class="ex-meta"><span>' + ex.sets + ' סטים</span><span>× ' + ex.reps + '</span>';
  if (ex.rest !== "-") html += '<span>🕐 ' + ex.rest + 'ש</span>';
  html += '</div>';
  if (showDay) html += '<div class="ex-day-badge" style="color:' + (ex.dayColor || color) + '">יום ' + ex.dayId + ' — ' + ex.sectionName + '</div>';
  html += '</div>';
  html += '<div class="ex-arrow ' + (isExpanded ? 'open' : '') + '">▼</div>';
  html += '</div>';

  if (isExpanded) {
    html += '<div class="ex-expanded" id="exexp-' + key + '">';
    html += buildExpandedContent(ex, key, color);
    html += '</div>';
  }

  html += '</div>';
  return html;
}

function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function switchView(v) { state.view = v; state.search = ""; state.expandedEx = null; render(); }
function switchDay(id) { state.activeDay = id; state.expandedEx = null; render(); var c = document.getElementById("content"); if(c) c.scrollTop = 0; }
function toggleEx(key) {
  var prevKey = state.expandedEx;
  state.expandedEx = (prevKey === key) ? null : key;

  // Close previously open card in-place
  if (prevKey) {
    var prevCard = document.getElementById('excard-' + prevKey);
    if (prevCard) {
      var prevExp = document.getElementById('exexp-' + prevKey);
      if (prevExp) prevCard.removeChild(prevExp);
      var prevArrow = prevCard.querySelector('.ex-arrow');
      if (prevArrow) prevArrow.classList.remove('open');
    }
  }

  // Open new card in-place (if toggling to a new one)
  if (state.expandedEx) {
    var card = document.getElementById('excard-' + key);
    if (!card) { render(); return; } // fallback

    var arrow = card.querySelector('.ex-arrow');
    if (arrow) arrow.classList.add('open');

    var info = exMap[key];
    if (!info) { render(); return; } // fallback

    var expDiv = document.createElement('div');
    expDiv.className = 'ex-expanded';
    expDiv.id = 'exexp-' + key;
    expDiv.innerHTML = buildExpandedContent(info.ex, key, info.color);
    card.appendChild(expDiv);

    // Scroll the card gently into view (doesn't jump, just reveals if off-screen)
    setTimeout(function() {
      card.scrollIntoView({behavior: 'smooth', block: 'nearest'});
    }, 80);
  }
}

function toggleDone(key) {
  state.completed[key] = !state.completed[key];
  saveCompleted();
  if (navigator.vibrate) navigator.vibrate(30);

  // In-place card update — no re-render
  var card = document.getElementById('excard-' + key);
  if (card) {
    if (state.completed[key]) { card.classList.add('done'); } else { card.classList.remove('done'); }
    var btn = card.querySelector('.done-btn');
    if (btn) {
      btn.textContent = state.completed[key] ? '✅ סיימתי' : '○ סמן כהושלם';
      if (state.completed[key]) { btn.classList.add('checked'); } else { btn.classList.remove('checked'); }
    }
  }
  // Update progress bar
  var day = DAYS.find(function(d){ return d.id === state.activeDay; });
  if (day) {
    var total = 0, done = 0;
    day.sections.forEach(function(sec) {
      sec.exercises.forEach(function(ex, i) {
        total++;
        if (state.completed[day.id + "-" + sec.name + "-" + i]) done++;
      });
    });
    var pct = total > 0 ? Math.round((done / total) * 100) : 0;
    var fill = document.querySelector('.progress-fill');
    if (fill) fill.style.width = pct + '%';
    var counter = document.querySelector('.progress-top span:last-child');
    if (counter) counter.textContent = done + '/' + total;
  }
}
function onSearch(val) { state.search = val; state.view = "search"; render(); }
function showTimer() { state.timerVisible = true; render(); }

window.startTimer = startTimer;
window.stopTimer = stopTimer;
window.switchView = switchView;
window.switchDay = switchDay;
window.toggleEx = toggleEx;
window.toggleDone = toggleDone;
window.onSearch = onSearch;
window.showTimer = showTimer;

render();
</script>
</body>
