<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --push:#E94560;--pull:#2980B9;--legs:#27AE60;--mob:#8E44AD;
  --dk:#08080f;--card:rgba(255,255,255,.04);--bd:rgba(255,255,255,.07);
  --t1:#eaeaea;--t2:rgba(255,255,255,.5);
  --sT:env(safe-area-inset-top,0px);--sB:env(safe-area-inset-bottom,0px)
}
html,body{height:100%;overflow:hidden;background:var(--dk);color:var(--t1);font-family:'Heebo',sans-serif}
#app{height:100%;display:flex;flex-direction:column}

/* Header */
.hd{padding:calc(10px + var(--sT)) 16px 10px;flex-shrink:0;z-index:100;position:relative}
.hd-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.hd h1{font-size:18px;font-weight:900;color:#fff;letter-spacing:-.3px}
.hd-sub{font-size:10px;color:rgba(255,255,255,.6);margin-top:1px}
.vt{display:flex;gap:5px}
.vb{padding:6px 13px;border-radius:18px;border:none;font-family:'Heebo';font-size:11px;font-weight:700;cursor:pointer;background:rgba(255,255,255,.12);color:rgba(255,255,255,.8)}
.vb.a{background:#fff;color:#111}
.tabs{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;padding:8px 14px;border-radius:10px;border:2px solid transparent;background:rgba(255,255,255,.06);color:rgba(255,255,255,.7);font-family:'Heebo';font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .15s}
.tab.a{border-color:rgba(255,255,255,.5);background:rgba(255,255,255,.15);color:#fff}

/* Content */
.cnt{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px 12px calc(16px + var(--sB))}

/* Progress */
.prog{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:12px 14px;margin-bottom:12px}
.prog-top{display:flex;justify-content:space-between;font-size:12px;font-weight:600;margin-bottom:6px}
.prog-bar{height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;transition:width .4s}
.prog-done{text-align:center;margin-top:6px;font-size:12px;color:#2ecc71;font-weight:700}

/* Warning */
.warn{background:rgba(243,156,18,.08);border:1px solid rgba(243,156,18,.2);border-radius:10px;padding:10px 12px;margin-bottom:12px;font-size:11px;line-height:1.6}

/* Section header */
.sec-h{display:flex;align-items:center;gap:8px;padding:10px 2px 6px}
.sec-ln{width:3px;height:20px;border-radius:2px;flex-shrink:0}
.sec-t{font-size:14px;font-weight:700}

/* Exercise Card */
.ec{background:var(--card);border:1px solid var(--bd);border-radius:12px;margin-bottom:6px;overflow:hidden}
.ec.done{background:rgba(46,204,113,.05);border-color:rgba(46,204,113,.15)}
.ec-m{display:flex;align-items:center;gap:9px;padding:11px 12px;cursor:pointer;user-select:none}
.ec-i{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.ec-f{flex:1;min-width:0}
.ec-n{font-weight:700;font-size:13px;color:#fff;line-height:1.3}
.ec-mt{font-size:10px;color:var(--t2);display:flex;gap:7px;margin-top:1px;flex-wrap:wrap}
.ec-dg{font-size:9px;font-weight:700;margin-top:2px}
.ec-ar{font-size:10px;color:rgba(255,255,255,.15);transition:transform .3s;flex-shrink:0}
.ec-ar.o{transform:rotate(180deg)}

/* Expanded */
.ec-x{padding:0 12px 12px;border-top:1px solid rgba(255,255,255,.04)}
.ec-nt{background:rgba(255,255,255,.025);border-radius:8px;padding:9px 10px;margin:8px 0;font-size:11px;line-height:1.65;color:rgba(255,255,255,.65)}
.ec-g{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:10px}
.ec-s{border-radius:8px;padding:7px;text-align:center}
.ec-sl{font-size:9px;color:var(--t2)}
.ec-sv{font-size:16px;font-weight:800}
.ec-a{display:flex;gap:6px}
.dn-b{flex:1;padding:11px;border-radius:10px;border:2px solid rgba(255,255,255,.1);background:transparent;color:rgba(255,255,255,.4);font-family:'Heebo';font-size:13px;font-weight:700;cursor:pointer;text-align:center}
.dn-b.k{border-color:#2ecc71;background:rgba(46,204,113,.1);color:#2ecc71}

/* Video */
.vid-wrap{width:100%;aspect-ratio:16/9;border-radius:10px;overflow:hidden;background:#0d0d0d;margin:8px 0;position:relative}
.vid-wrap iframe{width:100%;height:100%;border:none;display:block}
.vid-thumb{width:100%;height:100%;position:relative;cursor:pointer}
.vid-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.vid-play{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:64px;height:64px;background:rgba(255,0,0,.92);border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(0,0,0,.5)}
.vid-play::after{content:'';border-left:26px solid #fff;border-top:15px solid transparent;border-bottom:15px solid transparent;margin-right:-4px}
.vid-hint{text-align:center;font-size:11px;color:rgba(255,255,255,.35);margin-top:2px;margin-bottom:6px}

/* Muscles badge */
.musc{display:inline-flex;align-items:center;gap:3px;padding:2px 6px;border-radius:6px;font-size:9px;font-weight:600;background:rgba(255,255,255,.06);color:rgba(255,255,255,.5);margin-top:2px}

/* Timer */
.tmr{position:fixed;bottom:0;left:0;right:0;background:rgba(8,8,15,.95);backdrop-filter:blur(16px);border-top:1px solid rgba(255,255,255,.08);padding:10px 14px calc(10px + var(--sB));display:flex;align-items:center;gap:10px;z-index:200;transform:translateY(100%);transition:transform .25s}
.tmr.v{transform:translateY(0)}
.tmr-d{font-size:28px;font-weight:900;font-variant-numeric:tabular-nums;min-width:70px;text-align:center}
.tmr-bs{display:flex;gap:6px;flex:1}
.tmr-p{flex:1;padding:9px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:#fff;font-family:'Heebo';font-size:12px;font-weight:600;cursor:pointer}
.tmr-p:active{background:#E94560;border-color:#E94560}
.tmr-c{width:36px;height:36px;border-radius:18px;border:none;background:rgba(255,255,255,.06);color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.fab{position:fixed;bottom:calc(16px + var(--sB));left:14px;width:50px;height:50px;border-radius:25px;background:linear-gradient(135deg,#E94560,#c0392b);color:#fff;border:none;font-size:20px;cursor:pointer;box-shadow:0 3px 16px rgba(233,69,96,.35);display:flex;align-items:center;justify-content:center;z-index:150}
.fab:active{transform:scale(.9)}

/* Search */
.s-in{width:100%;padding:11px 16px;border-radius:12px;border:1.5px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:#fff;font-family:'Heebo';font-size:14px;outline:none;direction:rtl}
.s-in:focus{border-color:#E94560}
.s-in::placeholder{color:rgba(255,255,255,.3)}
.s-tags{display:flex;flex-wrap:wrap;gap:5px;padding:8px 0}
.s-tag{padding:4px 10px;border-radius:14px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.03);color:rgba(255,255,255,.5);font-family:'Heebo';font-size:11px;cursor:pointer}
</style>
</head>

    {n:"פלאנק צדדי",s:"3",r:"30ש/צד",rest:"30",nt:"גוף בקו ישר! ליבה מהודקת",v:"side+plank+proper+form",ic:"📐",mu:"אובליקים, ליבה"},
    {n:"Landmine Anti-Rotation Hold",s:"3",r:"20ש/צד",rest:"45",nt:"איזומטרי! החזק את הברבל מולך בידיים ישרות. התנגד לסיבוב בלי לזוז!",v:"landmine+anti+rotation+hold+isometric+core",ic:"🧊",mu:"ליבה (isometric anti-rotation)"},
    {n:"Landmine Rainbow",s:"3",r:"8/צד",rest:"60",nt:"קשת — העבר את הברבל מצד לצד בקשת מעל הראש. רוטציה מבוקרת + אנטי לטרל",v:"landmine+rainbow+arc+core+rotation",ic:"🌈",mu:"אובליקים, ליבה (rotational + anti-lateral)"},
    {n:"Farmer's Walk",s:"3",r:"30מ",rest:"60",nt:"כתפיים למטה, ליבה מהודקת, צעדים קצרים",v:"farmers+walk+dumbbell",ic:"🚶",mu:"ליבה, אחיזה, טרפז"},
    {n:"90/90 Hip Stretch",s:"2",r:"45ש/צד",rest:"-",nt:"פתיחת ירכיים אחרי עבודה כבדה",v:"90+90+hip+stretch",ic:"🧘‍♂️",mu:"ירכיים"},
  ]}
]},

// ========== DAY D: MOBILITY ==========
{id:"D",t:"Mobility — מוביליות + שיקום",ic:"🧘",co:"#8E44AD",sc:[
  {nm:"כפות רגליים (15 דק)",ex:[
    {n:"כדור טניס יחף",s:"3",r:"60ש/צד",rest:"-",nt:"לחץ קל-בינוני. מקשת עד אצבעות",v:"tennis+ball+foot+massage+flat+feet",ic:"🎾",mu:"כף רגל"},
    {n:"Towel Scrunches",s:"3",r:"15",rest:"-",nt:"חיזוק שרירי כף רגל",v:"towel+scrunch+foot+exercise",ic:"🧣",mu:"שרירי כף רגל"},
    {n:"עמידה רגל אחת — עיניים עצומות",s:"3",r:"30ש/צד",rest:"-",nt:"אתגר יציבות מקסימלי!",v:"single+leg+balance+eyes+closed",ic:"👁️",mu:"קרסול, יציבות"},
  ]},
  {nm:"ירכיים + עמוד שדרה (15 דק)",ex:[
    {n:"90/90 Hip Flow",s:"3",r:"8/צד",rest:"-",nt:"עבור בין צדדים בצורה זורמת",v:"90+90+hip+flow+mobility",ic:"🔄",mu:"ירכיים"},
    {n:"Deep Squat + Thoracic Rotation",s:"3",r:"5/צד",rest:"-",nt:"סקוואט עמוק + סיבוב למעלה",v:"deep+squat+thoracic+rotation",ic:"🏋️",mu:"ירכיים, עמוד שדרה"},
    {n:"Open Books",s:"3",r:"8/צד",rest:"-",nt:"שכב על הצד, סובב גוף עליון",v:"open+book+thoracic+stretch",ic:"📖",mu:"עמוד שדרה חזי"},
  ]},
  {nm:"כתפיים + שורש כף יד (10 דק)",ex:[
    {n:"Shoulder CARs",s:"2",r:"5/כיוון",rest:"-",nt:"סיבוב מלא איטי!",v:"shoulder+CARs+controlled",ic:"🔵",mu:"כתפיים"},
    {n:"Wall Slides",s:"3",r:"10",rest:"-",nt:"גב+ידיים צמודים לקיר. יציבות שכמה",v:"wall+slide+shoulder+scapula",ic:"🧱",mu:"שכמה"},
    {n:"Wrist CARs + מתיחות",s:"2",r:"10/כיוון",rest:"-",nt:"שיקום שורש כף יד. עדינות!",v:"wrist+CARs+stretches+mobility",ic:"✋",mu:"שורש כף יד"},
  ]},
  {nm:"גמישות סטטית (15 דק)",ex:[
    {n:"מתיחת יונה (Pigeon)",s:"2",r:"60ש/צד",rest:"-",nt:"ירכיים + גלוטאלי",v:"pigeon+stretch+hip+opener",ic:"🕊️",mu:"ירכיים, גלוטאלי"},
    {n:"מתיחת Hip Flexor",s:"2",r:"45ש/צד",rest:"-",nt:"קריטי למי שעומד הרבה!",v:"hip+flexor+stretch+kneeling",ic:"🏃",mu:"כופף ירך"},
    {n:"מתיחת חזה + ירכיים אחורית",s:"2",r:"45ש/צד",rest:"-",nt:"שלושה כיוונים: משקוף, רצפה, קיר",v:"chest+stretch+hamstring+stretch",ic:"🚪",mu:"חזה, ירכיים אחורית"},
    {n:"מתיחת שורש כף יד",s:"2",r:"30ש/צד",rest:"-",nt:"שני כיוונים. עדינות!",v:"wrist+flexor+extensor+stretch",ic:"🖐️",mu:"שורש כף יד"},
    {n:"נשימה עמוקה — סיום",s:"1",r:"2 דקות",rest:"-",nt:"4 שאיפה, 7 החזקה, 8 נשיפה. הרגע!",v:"box+breathing+4+7+8",ic:"🧘‍♂️",mu:"מערכת עצבים"},
  ]}
]}
];

// Flatten all exercises (for search)
var allEx = [];
DAYS.forEach(function(d){
  d.sc.forEach(function(s){
    s.ex.forEach(function(e){
      allEx.push({n:e.n,s:e.s,r:e.r,rest:e.rest,nt:e.nt,v:e.v,ic:e.ic,mu:e.mu,di:d.id,dt:d.t,dc:d.co,sn:s.nm});
    });
  });
});

// State
var S = {d:"A",v:"plan",q:"",x:null,dn:{}};
try { S.dn = JSON.parse(localStorage.getItem("ppl1") || "{}"); } catch(e) {}
function sv() { try { localStorage.setItem("ppl1", JSON.stringify(S.dn)); } catch(e) {} }

// Timer
var TI = null, TS = 0, TR = false, TV = false;
function stT(s) {
  clearInterval(TI); TS = s; TR = true; TV = true;
  TI = setInterval(function(){
    TS--;
    if (TS <= 0) {
      clearInterval(TI); TR = false; TS = 0;
      try { navigator.vibrate([200,100,200,100,200]); } catch(e) {}
    }
    // update timer display in-place
    var td = document.querySelector('.tmr-d');
    if (td) td.textContent = fT(TS);
    if (td) td.style.color = (TS <= 5 && TR) ? '#E94560' : '#fff';
  }, 1000);
  var tmr = document.querySelector('.tmr');
  if (tmr) tmr.classList.add('v');
  var fab = document.querySelector('.fab');
  if (fab) fab.style.display = 'none';
  var td = document.querySelector('.tmr-d');
  if (td) td.textContent = fT(TS);
}
function spT() {
  clearInterval(TI); TR = false; TV = false;
  var tmr = document.querySelector('.tmr');
  if (tmr) tmr.classList.remove('v');
  var fab = document.querySelector('.fab');
  if (fab) fab.style.display = 'flex';
}
function fT(s) { return Math.floor(s/60) + ":" + (s%60).toString().padStart(2,"0"); }

// Video system
var vidPlay = {};
var exMap = {};

function playVideo(key, vid) {
  vidPlay[key] = true;
  var wrap = document.getElementById('vid-' + key);
  if (wrap && vid) {
    wrap.innerHTML = '<iframe src="https://www.youtube-nocookie.com/embed/' + vid +
      '?autoplay=1&rel=0&modestbranding=1&playsinline=1" allowfullscreen ' +
      'allow="autoplay; encrypted-media; fullscreen; picture-in-picture"></iframe>';
  }
}

function videoHtml(key, vq) {
  var vid = VM[vq] || null;
  if (!vid) return '<div style="text-align:center;padding:8px;font-size:11px;color:rgba(255,255,255,.3)">🎬 אין הדגמה לתרגיל זה</div>';

  if (vidPlay[key]) {
    return '<div class="vid-wrap" id="vid-' + key + '"><iframe src="https://www.youtube-nocookie.com/embed/' + vid +
      '?autoplay=1&rel=0&modestbranding=1&playsinline=1" allowfullscreen ' +
      'allow="autoplay; encrypted-media; fullscreen; picture-in-picture"></iframe></div>' +
      '<div class="vid-hint">🎬 הסרטון מתנגן בתוך האפליקציה</div>';
  }

  var thumb = "https://img.youtube.com/vi/" + vid + "/mqdefault.jpg";
  return '<div class="vid-wrap" id="vid-' + key + '"><div class="vid-thumb" onclick="event.stopPropagation();playVideo(\'' +
    key + '\',\'' + vid + '\')">' +
    '<img src="' + thumb + '" alt="הדגמה">' +
    '<div class="vid-play"></div>' +
    '</div></div>' +
    '<div class="vid-hint">לחץ ▶️ לצפייה בתוך האפליקציה</div>';
}

function eH(s) {
  if (!s) return '';
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// Build expanded content for a card (used both in initial render and in-place toggle)
function buildExp(e, key, c) {
  var isDone = !!S.dn[key];
  var h = videoHtml(key, e.v);
  h += '<div class="ec-nt">💡 <b>הערות:</b> ' + eH(e.nt) + '</div>';
  h += '<div class="ec-g">';
  h += '<div class="ec-s" style="background:' + c + '10"><div class="ec-sl">סטים</div><div class="ec-sv" style="color:' + c + '">' + e.s + '</div></div>';
  h += '<div class="ec-s" style="background:' + c + '10"><div class="ec-sl">חזרות</div><div class="ec-sv" style="color:' + c + '">' + e.r + '</div></div>';
  h += '<div class="ec-s" style="background:' + c + '10"><div class="ec-sl">מנוחה</div><div class="ec-sv" style="color:' + c + '">' + (e.rest === "-" ? "—" : e.rest + "ש") + '</div></div>';
  h += '</div>';
  h += '<div class="ec-a"><button class="dn-b' + (isDone ? ' k' : '') + '" onclick="event.stopPropagation();tD(\'' + key + '\')">' + (isDone ? '✅ סיימתי' : '○ סמן כהושלם') + '</button></div>';
  return h;
}

function rC(e, key, c, sd) {
  exMap[key] = {e: e, c: c};
  var isE = S.x === key, isDone = !!S.dn[key];
  var h = '<div class="ec' + (isDone ? ' done' : '') + '" id="excard-' + key + '">';
  h += '<div class="ec-m" onclick="tX(\'' + key + '\')">';
  h += '<div class="ec-i" style="background:' + c + '15">' + e.ic + '</div>';
  h += '<div class="ec-f"><div class="ec-n">' + eH(e.n) + '</div>';
  h += '<div class="ec-mt"><span>' + e.s + ' סט</span><span>×' + e.r + '</span>' + (e.rest !== "-" ? '<span>⏱' + e.rest + 'ש</span>' : '') + '</div>';
  if (sd) h += '<div class="ec-dg" style="color:' + (e.dc||c) + '">יום ' + e.di + ' • ' + eH(e.sn) + '</div>';
  if (e.mu) h += '<div class="musc">' + eH(e.mu) + '</div>';
  h += '</div><div class="ec-ar' + (isE ? ' o' : '') + '">▼</div></div>';
  if (isE) {
    h += '<div class="ec-x" id="exexp-' + key + '">' + buildExp(e, key, c) + '</div>';
  }
  h += '</div>';
  return h;
}

// =====================
// TOGGLE — in-place DOM, NO page re-render
// =====================
function tX(key) {
  var prev = S.x;
  S.x = (prev === key) ? null : key;

  // Close previously open card
  if (prev) {
    var prevCard = document.getElementById('excard-' + prev);
    if (prevCard) {
      var prevExp = document.getElementById('exexp-' + prev);
      if (prevExp) prevCard.removeChild(prevExp);
      var prevArr = prevCard.querySelector('.ec-ar');
      if (prevArr) prevArr.classList.remove('o');
    }
  }

  // Open new card
  if (S.x) {
    var card = document.getElementById('excard-' + key);
    if (!card) { R(); return; }
    var arr = card.querySelector('.ec-ar');
    if (arr) arr.classList.add('o');
    var info = exMap[key];
    if (!info) { R(); return; }
    var expDiv = document.createElement('div');
    expDiv.className = 'ec-x';
    expDiv.id = 'exexp-' + key;
    expDiv.innerHTML = buildExp(info.e, key, info.c);
    card.appendChild(expDiv);
    setTimeout(function() { card.scrollIntoView({behavior:'smooth', block:'nearest'}); }, 80);
  }
}

function tD(key) {
  S.dn[key] = !S.dn[key];
  sv();
  try { navigator.vibrate(30); } catch(e) {}
  // In-place card update
  var card = document.getElementById('excard-' + key);
  if (card) {
    if (S.dn[key]) { card.classList.add('done'); } else { card.classList.remove('done'); }
    var btn = card.querySelector('.dn-b');
    if (btn) {
      btn.textContent = S.dn[key] ? '✅ סיימתי' : '○ סמן כהושלם';
      if (S.dn[key]) { btn.classList.add('k'); } else { btn.classList.remove('k'); }
    }
  }
  // Update progress bar
  var day = DAYS.find(function(d){ return d.id === S.d; });
  if (day) {
    var total = 0, done = 0;
    day.sc.forEach(function(sec) { sec.ex.forEach(function(e,i) { total++; if (S.dn[day.id+"-"+sec.nm+"-"+i]) done++; }); });
    var pct = total ? Math.round(done/total*100) : 0;
    var fill = document.querySelector('.prog-fill');
    if (fill) fill.style.width = pct + '%';
    var ctr = document.querySelector('.prog-top span:last-child');
    if (ctr) { ctr.textContent = done + '/' + total; ctr.style.color = day.co; }
    var pd = document.querySelector('.prog-done');
    if (pct === 100 && !pd) {
      var pb = document.querySelector('.prog-bar');
      if (pb) { var d2 = document.createElement('div'); d2.className='prog-done'; d2.textContent='🎉 סיימת! כל הכבוד!'; pb.after(d2); }
    } else if (pct < 100 && pd) { pd.remove(); }
  }
}

// =====================
// MAIN RENDER (only for view/day switches)
// =====================
function R() {
  var _scrollY = window.scrollY || window.pageYOffset || 0;
  var a = document.getElementById("app");
  var dy = DAYS.find(function(d){ return d.id === S.d; });
  var iS = S.v === "search";
  var sr = [];
  if (iS && S.q.trim()) {
    var q = S.q.toLowerCase();
    allEx.forEach(function(e){
      if (e.n.toLowerCase().indexOf(q) > -1 || e.nt.toLowerCase().indexOf(q) > -1 ||
          e.sn.toLowerCase().indexOf(q) > -1 || (e.mu && e.mu.toLowerCase().indexOf(q) > -1)) sr.push(e);
    });
  }
  var t = 0, dn = 0;
  if (dy) dy.sc.forEach(function(s){ s.ex.forEach(function(e,i){ t++; if(S.dn[dy.id+"-"+s.nm+"-"+i]) dn++; }); });
  var p = t ? Math.round(dn/t*100) : 0;

  var grad = dy ? dy.co : '#E94560';
  var h = '<div class="hd" style="background:linear-gradient(135deg,' + grad + ',' + grad + '33)">';
  h += '<div class="hd-top"><div><h1>🔥 PPL Training</h1><div class="hd-sub">Push / Pull / Legs + Mobility</div></div>';
  h += '<div class="vt"><button class="vb' + (iS?'':' a') + '" onclick="sV(\'plan\')">📋</button>';
  h += '<button class="vb' + (iS?' a':'') + '" onclick="sV(\'search\')">🔍</button></div></div>';
  if (!iS) {
    h += '<div class="tabs">';
    DAYS.forEach(function(d){ h += '<button class="tab' + (d.id===S.d?' a':'') + '" onclick="sD(\'' + d.id + '\')" style="' + (d.id===S.d?'border-color:'+d.co+';color:#fff':'') + '">' + d.ic + ' ' + d.id + '</button>'; });
    h += '</div>';
  }
  h += '</div><div class="cnt" id="cn">';

  if (iS) {
    h += '<div style="padding:10px 4px 6px"><input class="s-in" type="text" placeholder="🔍 חפש תרגיל, שריר, קבוצת שרירים..." value="' + eH(S.q) + '" oninput="oS(this.value)" autofocus></div>';
    if (!S.q.trim()) {
      h += '<div class="s-tags">';
      ["חזה","גב","כתפיים","רגליים","ליבה","squat","deadlift","press","curl","stretch","שכמה","כף רגל"].forEach(function(tag){ h += '<button class="s-tag" onclick="oS(\'' + tag + '\')">' + tag + '</button>'; });
      h += '</div><div style="text-align:center;padding:40px 20px;color:rgba(255,255,255,.3)"><div style="font-size:40px;margin-bottom:10px">🔍</div><p style="font-size:13px">חפש לפי שם, שריר, או קבוצת שרירים</p></div>';
    } else {
      h += '<div style="font-size:11px;color:rgba(255,255,255,.45);padding:4px 2px 6px">' + sr.length + ' תוצאות</div>';
      sr.forEach(function(e,i){ h += rC(e,"s-"+i,e.dc||"#E94560",true); });
    }
  } else {
    h += '<div class="prog"><div class="prog-top"><span>' + dy.ic + ' ' + dy.t + '</span><span style="color:' + dy.co + ';font-weight:700">' + dn + '/' + t + '</span></div>';
    h += '<div class="prog-bar"><div class="prog-fill" style="width:' + p + '%;background:' + dy.co + '"></div></div>';
    if (p === 100) h += '<div class="prog-done">🎉 סיימת! כל הכבוד!</div>';
    h += '</div>';
    if (dy.id==="A"||dy.id==="B") h += '<div class="warn">⚠️ <b>שורש כף יד ימין:</b> אחיזה ניטרלית / אגרופים / EZ-Bar. אם כואב — תעצור!</div>';
    dy.sc.forEach(function(s){
      h += '<div class="sec-h"><div class="sec-ln" style="background:' + dy.co + '"></div><div class="sec-t">' + s.nm + '</div></div>';
      s.ex.forEach(function(e,i){ h += rC(e, dy.id+"-"+s.nm+"-"+i, dy.co, false); });
    });
  }
  h += '</div>';
  if (!TV) h += '<button class="fab" onclick="shT()">⏱</button>';
  h += '<div class="tmr' + (TV?' v':'') + '"><div class="tmr-d" style="color:' + (TS<=5&&TR?'#E94560':'#fff') + '">' + fT(TS) + '</div>';
  h += '<div class="tmr-bs"><button class="tmr-p" onclick="stT(60)">60ש</button><button class="tmr-p" onclick="stT(90)">90ש</button><button class="tmr-p" onclick="stT(120)">120ש</button></div>';
  h += '<button class="tmr-c" onclick="spT()">✕</button></div>';
  a.innerHTML = h;
  requestAnimationFrame(function() { if (_scrollY > 0) window.scrollTo(0, _scrollY); });
}

function sV(v) { S.v=v; S.q=""; S.x=null; R(); }
function sD(id) { S.d=id; S.x=null; R(); var c=document.getElementById("cn"); if(c) c.scrollTop=0; }
function oS(v) { S.q=v; S.v="search"; R(); }
function shT() { TV=true; R(); }

window.sV=sV; window.sD=sD; window.tX=tX; window.tD=tD; window.oS=oS; window.shT=shT;
window.stT=stT; window.spT=spT; window.playVideo=playVideo;

R();
</script>
</body>
</html>
